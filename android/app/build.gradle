apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: 'com.google.gms.google-services'

/* ===========================
   ⚠️  [TODO] google-services.json 임시 상태
   현재 google-services.json 의 package_name 은 club.about20s.cafemap 으로
   로컬에서만 수정한 임시 값입니다.
   → Firebase 콘솔(https://console.firebase.google.com) 에서
     프로젝트 > 앱 추가 > Android > 패키지명 club.about20s.cafemap 으로 등록 후
     발급받은 google-services.json 으로 교체해야 FCM/Analytics 가 정상 작동합니다.
=========================== */

/* ===========================
   ✅ [ADD] Load key.properties (release signing)
   - key.properties 가 있으면 RELEASE_* 값을 project.ext 로 주입
   - 없으면 release 서명 블록이 비어서(미서명) 빌드 단계에서만 문제나고,
     debug는 정상 동작
=========================== */
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

    // ✅ project.hasProperty('RELEASE_STORE_FILE')가 true가 되도록 주입
    keystoreProperties.each { key, value ->
        project.ext.set(key.toString(), value.toString())
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flav`or of JavaScriptCore (JSC)
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.about.studyaboutclubapp"

    defaultConfig {
        applicationId "club.about20s.cafemap"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 170
        versionName "1.3.40"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // key.properties → RELEASE_* 값 주입됨 (android/key.properties 기준)
            // file() 은 app/build.gradle 기준 → android/app/ 상대경로로 해석
            // keystore 위치: android/app/aboutclub.keystore
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation(platform("com.google.firebase:firebase-bom:33.6.0"))
    implementation("com.google.firebase:firebase-analytics")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
